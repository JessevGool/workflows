name: Deploy or Redeploy Portainer Stack

on:
  workflow_call:
    inputs:
      tailscale_ping_host:
        required: false
        type: string
        default: homelab
      stack_name:
        required: true
        type: string
      compose_file:
        required: false
        type: string
        default: docker-compose.yml
      registry:
        required: false
        type: string
        default: ""
    secrets:
      TS_OAUTH_CLIENT_ID:
        required: true
      TS_OAUTH_CLIENT_SECRET:
        required: true
      PORTAINER_TOKEN:
        required: true
      PORTAINER_HOST_IP:
        required: true
      ENDPOINT_ID:
        required: true
      STACK_ENV_JSON:
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:ci
          ping: ${{ inputs.tailscale_ping_host }}

      - name: Create or update Portainer stack
        env:
          PORTAINER_TOKEN: ${{ secrets.PORTAINER_TOKEN }}
          PORTAINER_HOST_IP: ${{ secrets.PORTAINER_HOST_IP }}
          ENDPOINT_ID: ${{ secrets.ENDPOINT_ID }}
          STACK_NAME: ${{ inputs.stack_name }}
          COMPOSE_FILE: ${{ inputs.compose_file }}
          REGISTRY: ${{ inputs.registry }}
          STACK_ENV_JSON: ${{ secrets.STACK_ENV_JSON }}
        run: |
          set -euo pipefail

          if [ ! -f "$COMPOSE_FILE" ]; then
            echo "Compose file not found: $COMPOSE_FILE"
            exit 1
          fi

          echo "Looking for existing stack named: $STACK_NAME"

          STACK_ID=$(curl -skSL \
            -H "X-API-Key: $PORTAINER_TOKEN" \
            "https://$PORTAINER_HOST_IP/api/stacks" \
            | jq -r --arg name "$STACK_NAME" --argjson endpoint_id "$ENDPOINT_ID" \
              '.[] | select(.Name == $name and .EndpointId == $endpoint_id) | .Id' \
            | head -n 1)

          if [ -n "${STACK_ENV_JSON:-}" ]; then
            STACK_ENV=$(echo "$STACK_ENV_JSON" | jq -c '
              if type == "object" then
                to_entries | map({name: .key, value: (.value | tostring)})
              elif type == "array" then
                .
              else
                error("STACK_ENV_JSON must be a JSON object or Portainer Env array")
              end
            ')
            echo "Using stack environment variables from STACK_ENV_JSON."
          elif [ -n "$STACK_ID" ]; then
            STACK_ENV=$(curl -skSL \
              -H "X-API-Key: $PORTAINER_TOKEN" \
              "https://$PORTAINER_HOST_IP/api/stacks/$STACK_ID" \
              | jq -c '.Env // []')
            echo "Preserving existing Portainer stack environment variables."
          else
            STACK_ENV="[]"
            echo "No STACK_ENV_JSON set; creating stack without environment variables."
          fi

          REGISTRY_ID=""
          if [ -n "$REGISTRY" ]; then
            echo "Looking for Portainer registry matching: $REGISTRY"

            REGISTRY_ID=$(curl -skSL \
              -H "X-API-Key: $PORTAINER_TOKEN" \
              "https://$PORTAINER_HOST_IP/api/registries" \
              | jq -r --arg registry "$REGISTRY" '
                  .[] |
                  select(
                    .URL == $registry or
                    .URL == ("https://" + $registry) or
                    .URL == ("http://" + $registry)
                  ) |
                  .Id
                ' \
              | head -n 1)

            if [ -z "$REGISTRY_ID" ]; then
              echo "No Portainer registry found for $REGISTRY. Private image pulls may fail."
            else
              echo "Using Portainer registry ID: $REGISTRY_ID"
            fi
          elif grep -Eq '^[[:space:]]*image:[[:space:]]*[^[:space:]]+:[0-9]+/' "$COMPOSE_FILE"; then
            echo "Compose file references a registry with an explicit port, but the registry input is empty."
            echo "Pass registry: \${{ vars.REGISTRY }} from the calling workflow."
            exit 1
          fi

          if [ -z "$STACK_ID" ]; then
            echo "Stack does not exist. Creating stack: $STACK_NAME"

            CURL_ARGS=(
              -skSL
              -X POST
              -H "X-API-Key: $PORTAINER_TOKEN"
              "https://$PORTAINER_HOST_IP/api/stacks/create/standalone/file?endpointId=$ENDPOINT_ID"
              -F "Name=$STACK_NAME"
              -F "Env=$STACK_ENV"
              -F "file=@$COMPOSE_FILE"
            )

            if [ -n "$REGISTRY_ID" ]; then
              CURL_ARGS+=(-F "Registries=[$REGISTRY_ID]")
            fi

            RESPONSE=$(curl "${CURL_ARGS[@]}")

            echo "Create response:"
            echo "$RESPONSE"

            if echo "$RESPONSE" | jq -e 'has("message") or has("details")' > /dev/null; then
              echo "Portainer returned an error while creating the stack."
              exit 1
            fi
          else
            echo "Stack exists with ID $STACK_ID. Updating stack..."

            UPDATE_PAYLOAD=$(jq -n \
              --rawfile stack_file "$COMPOSE_FILE" \
              --argjson env "$STACK_ENV" \
              '{
                StackFileContent: $stack_file,
                Env: $env,
                Prune: true,
                RepullImageAndRedeploy: true
              }')

            RESPONSE=$(curl -skSL -X PUT \
              -H "X-API-Key: $PORTAINER_TOKEN" \
              -H "Content-Type: application/json" \
              "https://$PORTAINER_HOST_IP/api/stacks/$STACK_ID?endpointId=$ENDPOINT_ID" \
              -d "$UPDATE_PAYLOAD")

            echo "Update response:"
            echo "$RESPONSE"

            if echo "$RESPONSE" | jq -e 'has("message") or has("details")' > /dev/null; then
              echo "Portainer returned an error while updating the stack."
              exit 1
            fi
          fi
