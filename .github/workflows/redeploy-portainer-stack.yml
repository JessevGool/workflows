name: Deploy or Redeploy Portainer Stack

on:
  workflow_call:
    inputs:
      tailscale_ping_host:
        required: false
        type: string
        default: homelab
      stack_name:
        required: true
        type: string
      compose_file:
        required: false
        type: string
        default: docker-compose.yml
    secrets:
      TS_OAUTH_CLIENT_ID:
        required: true
      TS_OAUTH_CLIENT_SECRET:
        required: true
      PORTAINER_TOKEN:
        required: true
      PORTAINER_HOST_IP:
        required: true
      ENDPOINT_ID:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:ci
          ping: ${{ inputs.tailscale_ping_host }}

      - name: Create or update Portainer stack
        env:
          PORTAINER_TOKEN: ${{ secrets.PORTAINER_TOKEN }}
          PORTAINER_HOST_IP: ${{ secrets.PORTAINER_HOST_IP }}
          ENDPOINT_ID: ${{ secrets.ENDPOINT_ID }}
          STACK_NAME: ${{ inputs.stack_name }}
          COMPOSE_FILE: ${{ inputs.compose_file }}
        run: |
          set -euo pipefail

          if [ ! -f "$COMPOSE_FILE" ]; then
            echo "Compose file not found: $COMPOSE_FILE"
            exit 1
          fi

          echo "Looking for existing stack named: $STACK_NAME"

          STACK_ID=$(curl -skSL \
            -H "X-API-Key: $PORTAINER_TOKEN" \
            "https://$PORTAINER_HOST_IP/api/stacks" \
            | jq -r --arg name "$STACK_NAME" --argjson endpoint_id "$ENDPOINT_ID" \
              '.[] | select(.Name == $name and .EndpointId == $endpoint_id) | .Id' \
            | head -n 1)

          if [ -z "$STACK_ID" ]; then
            echo "Stack does not exist. Creating stack: $STACK_NAME"

            RESPONSE=$(curl -skSL -X POST \
              -H "X-API-Key: $PORTAINER_TOKEN" \
              "https://$PORTAINER_HOST_IP/api/stacks/create/standalone/file?endpointId=$ENDPOINT_ID" \
              -F "Name=$STACK_NAME" \
              -F "Env=[]" \
              -F "file=@$COMPOSE_FILE")

            echo "Create response:"
            echo "$RESPONSE"
          else
            echo "Stack exists with ID $STACK_ID. Updating stack..."

            STACK_FILE_CONTENT=$(jq -Rs . < "$COMPOSE_FILE")

            RESPONSE=$(curl -skSL -X PUT \
              -H "X-API-Key: $PORTAINER_TOKEN" \
              -H "Content-Type: application/json" \
              "https://$PORTAINER_HOST_IP/api/stacks/$STACK_ID?endpointId=$ENDPOINT_ID" \
              -d "{
                \"StackFileContent\": $STACK_FILE_CONTENT,
                \"Env\": [],
                \"Prune\": true,
                \"RepullImageAndRedeploy\": true
              }")

            echo "Update response:"
            echo "$RESPONSE"
          fi
